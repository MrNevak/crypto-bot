<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Анализатор кошелька</title>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 500px; margin: 0 auto; }
        input, select, button { width: 100%; padding: 10px; margin: 10px 0; }
        button { background: #3390ec; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .result { margin-top: 20px; padding: 10px; background: #f5f5f5; border-radius: 8px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>💰 Анализатор кошелька</h1>
    
    <select id="token">
        <option value="ETH">ETH</option>
        <option value="USDT">USDT</option>
    </select>
    
    <select id="days">
        <option value="7">7 дней</option>
        <option value="30">30 дней</option>
    </select>
    
    <input type="text" id="address" placeholder="0x...">
    <button onclick="analyze()">Анализировать</button>
    
    <div id="result" class="result"></div>
    
    <script>
        async function analyze() {
            const address = document.getElementById('address').value;
            const token = document.getElementById('token').value;
            const days = document.getElementById('days').value;
            
            if (!address.startsWith('0x') || address.length !== 42) {
                document.getElementById('result').innerHTML = '❌ Некорректный адрес';
                return;
            }
            
            document.getElementById('result').innerHTML = '⏳ Анализирую...';
            
            try {
                const response = await fetch('http://localhost:5000/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address, token, days })
                });
                
                const data = await response.json();
                
                document.getElementById('result').innerHTML = `
✅ Баланс: ${data.balance} ${token}
📊 Транзакций: ${data.txCount}
⬇️ Получено: ${data.incoming} ${token}
⬆️ Отправлено: ${data.outgoing} ${token}
💡 ${data.insight}
                `;
            } catch (error) {
                document.getElementById('result').innerHTML = '❌ Ошибка: ' + error.message;
            }
        }
    </script>
</body>
</html>
